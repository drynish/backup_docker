services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=America/Montreal
    volumes:
      - /home/drynish/docker/prowlarr:/config
    restart: unless-stopped
    networks:
      - caddy
    cpu_shares: 256
    labels:
       caddy: prowlarr.drynish.synology.me
       caddy.reverse_proxy: "{{upstreams 9696}}"
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=America/Montreal
    volumes:
      - /home/drynish/docker/sonarr:/config
      - /home/drynish/mnt/Series:/tv #optional
      - /home/drynish/mnt/Download:/downloads #optional
    restart: unless-stopped
    networks: 
      - caddy
    cpu_shares: 256
    labels:
       caddy: sonarr.drynish.synology.me
       caddy.reverse_proxy: "{{upstreams 8989}}"
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=America/Montreal
    volumes:
      - /home/drynish/docker/radarr:/config
      - /home/drynish/mnt/Movies:/movies #optional
      - /home/drynish/mnt/Download:/downloads #optional
    restart: unless-stopped
    networks: 
      - caddy
    cpu_shares: 256
    labels:
       caddy: radarr.drynish.synology.me
       caddy.reverse_proxy: "{{upstreams 7878}}"
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=America/Montreal
    volumes:
      - /home/drynish/docker/bazarr:/config
      - /home/drynish/mnt/Movies:/movies #optional
      - /home/drynish/mnt/Series:/tv #optional
    restart: unless-stopped
    networks: 
      - caddy
    cpu_shares: 256
    labels:
       caddy: bazarr.drynish.synology.me
       caddy.reverse_proxy: "{{upstreams 6767}}"
  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
    ports:
      - 8191:8191
    networks:
      - caddy
    restart: unless-stopped
    cpu_shares: 256
    labels:
       caddy: flaresolverr.drynish.synology.me
       caddy.reverse_proxy: "{{upstreams 8191}}"
networks:
  caddy:
    external: true
